name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 8 */3 * *"  # כל 3 ימים בשעה 8:00 UTC
  workflow_dispatch:        # אפשרות להרצה ידנית

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping PrintDesk
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://mindcet-printer.netlify.app/api/debug/config-check)
          echo "Response: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: site returned $STATUS"
            exit 1
          fi
